<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patent Element Inspector</title>
<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f7f8fa;--bg2:#fff;--bg3:#f0f2f5;--bg4:#e8ebf0;--brd:#e2e5ea;--brd2:#cdd2da;--tx:#1a1d23;--tx2:#5c6370;--tx3:#9099a6;--acc:#2563eb;--acc2:#1d4ed8;--acc-bg:rgba(37,99,235,.06);--acc-brd:rgba(37,99,235,.15);--green:#16a34a;--green-bg:rgba(22,163,74,.06);--green-brd:rgba(22,163,74,.15);--yellow:#d97706;--red:#dc2626;--red-bg:rgba(220,38,38,.06);--pink:#db2777;--pink-bg:rgba(219,39,119,.06);--pink-brd:rgba(219,39,119,.15);--blue:#2563eb;--radius:6px}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--tx);font-size:12px;line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* Header */
.header{background:#1e293b;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.header .icon{width:24px;height:24px;background:var(--acc);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;font-weight:700}
.header .title{font-size:12px;font-weight:600;color:#e2e8f0}
.header .ver{font-size:8px;color:#64748b;margin-left:auto}
.header .status-dot{width:6px;height:6px;border-radius:50%;margin-left:4px}
.header .status-dot.ok{background:#22c55e;animation:pulse 2s infinite}
.header .status-dot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--brd);padding:0 4px;flex-shrink:0}
.tab{flex:1;padding:8px 0;font-size:10px;font-weight:500;color:var(--tx3);text-align:center;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s}
.tab:hover{color:var(--tx2);background:var(--bg3)}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);font-weight:600}
.tab .badge{display:inline-block;font-size:7px;padding:1px 4px;border-radius:8px;background:var(--red);color:#fff;margin-left:2px;font-weight:600}

/* Tab content */
.panel{display:none;flex:1;overflow-y:auto;flex-direction:column}.panel.active{display:flex}

/* Add from selection */
.sel-bar{padding:8px 10px;background:var(--acc-bg);border-bottom:1px solid var(--acc-brd);display:flex;align-items:center;gap:6px}
.sel-bar .sel-text{flex:1;font-size:10px;color:var(--acc);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sel-bar .sel-btn{padding:4px 10px;background:var(--acc);color:#fff;border:none;border-radius:4px;font-size:9px;font-weight:600;cursor:pointer}
.sel-bar .sel-btn:hover{background:var(--acc2)}
.sel-bar .sel-btn:disabled{background:var(--bg4);color:var(--tx3);cursor:default}

/* Add form */
.add-form{padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--brd);display:flex;gap:5px}
.add-form input{border:1px solid var(--brd2);border-radius:5px;padding:5px 7px;font-size:10px;background:var(--bg);color:var(--tx);outline:none;font-family:inherit}
.add-form input:focus{border-color:var(--acc);box-shadow:0 0 0 2px rgba(37,99,235,.08)}
.num-input{width:48px;font-family:'Cascadia Code',monospace;text-align:center}
.name-input{flex:1}
.add-btn{padding:5px 10px;background:var(--acc);color:#fff;border:none;border-radius:5px;font-size:9px;font-weight:600;cursor:pointer}
.add-btn:hover{background:var(--acc2)}

/* Search + Filter */
.search-bar{padding:5px 10px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.search-bar input{width:100%;padding:5px 7px;font-size:10px;border:1px solid var(--brd);border-radius:4px;background:var(--bg);color:var(--tx);outline:none}
.search-bar input:focus{border-color:var(--acc)}
.filter-bar{display:flex;padding:5px 10px;gap:3px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.fbtn{padding:2px 7px;font-size:8px;border:1px solid var(--brd);border-radius:3px;background:var(--bg);color:var(--tx2);cursor:pointer;font-weight:500}
.fbtn:hover{border-color:var(--acc);color:var(--acc)}
.fbtn.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.fbtn .cnt{font-family:monospace;font-size:7px;margin-left:2px;opacity:.7}

/* Element list */
.elem-list{flex:1;overflow-y:auto;padding:2px 0}
.elem-row{display:flex;align-items:center;padding:6px 10px;gap:6px;cursor:pointer;border-bottom:1px solid var(--bg3);transition:background .08s}
.elem-row:hover{background:var(--bg3)}
.elem-row.active{background:var(--acc-bg);border-left:3px solid var(--acc)}
.elem-row.manual{border-left:3px solid var(--green)}
.e-num{font-family:'Cascadia Code',monospace;font-size:12px;font-weight:700;color:var(--acc);min-width:32px}
.e-info{flex:1;min-width:0}
.e-name{font-size:10px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.e-meta{font-size:8px;color:var(--tx3)}
.e-badges{display:flex;gap:2px}
.bsm{font-size:7px;padding:1px 4px;border-radius:3px;font-weight:600}
.b-manual{background:var(--green-bg);color:var(--green);border:1px solid var(--green-brd)}
.b-issue{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.15)}
.b-ok{background:var(--green-bg);color:var(--green);border:1px solid var(--green-brd)}

/* Detail */
.detail{background:var(--bg2);border-top:1px solid var(--brd);max-height:0;overflow:hidden;transition:max-height .25s}
.detail.open{max-height:380px;overflow-y:auto}
.detail-inner{padding:10px}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dh-num{font-family:monospace;font-size:18px;font-weight:700;color:var(--acc)}
.dh-close{width:22px;height:22px;display:flex;align-items:center;justify-content:center;border:none;background:var(--bg3);border-radius:4px;cursor:pointer;color:var(--tx3);font-size:12px}
.fg{margin-bottom:8px}
.fl{font-size:8px;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3);font-weight:600;margin-bottom:2px}
.fi{width:100%;padding:4px 7px;font-size:10px;border:1px solid var(--brd);border-radius:4px;background:var(--bg);color:var(--tx);outline:none;font-family:inherit}
.fi:focus{border-color:var(--acc)}
.fh{font-size:8px;color:var(--tx3);margin-top:1px}
.old-tag{display:inline-flex;align-items:center;gap:2px;padding:2px 6px;border-radius:3px;font-size:8px;font-weight:500;background:var(--pink-bg);color:var(--pink);border:1px solid var(--pink-brd);margin:2px 2px 0 0}
.hl-row{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:3px;cursor:pointer;font-size:9px}
.hl-row:hover{background:var(--bg3)}
.hl-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hl-dot.green{background:var(--green)}.hl-dot.yellow{background:var(--yellow)}.hl-dot.pink{background:var(--pink)}.hl-dot.blue{background:var(--blue)}

/* Inspection */
.insp-btn{width:calc(100% - 20px);margin:10px;padding:10px;background:var(--acc);color:#fff;border:none;border-radius:var(--radius);font-size:12px;font-weight:600;cursor:pointer}
.insp-btn:hover{background:var(--acc2)}
.insp-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:8px 10px;background:var(--bg2);border-bottom:1px solid var(--brd)}
.istat{text-align:center;padding:6px;border-radius:var(--radius);background:var(--bg)}
.istat .n{font-family:monospace;font-size:16px;font-weight:700}.istat .l{font-size:7px;text-transform:uppercase;color:var(--tx3)}
.issue-item{padding:8px 10px;border-bottom:1px solid var(--bg3);cursor:pointer}
.issue-item:hover{background:var(--bg3)}
.it{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.it.old{color:var(--pink)}.it.mis{color:var(--red)}.it.orp{color:var(--yellow)}
.id{font-size:10px;color:var(--tx);margin-top:2px}

/* Statusbar */
.statusbar{padding:5px 10px;background:var(--bg2);border-top:1px solid var(--brd);font-size:8px;color:var(--tx3);display:flex;justify-content:space-between;flex-shrink:0}

/* Toast */
.toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;padding:6px 16px;border-radius:6px;font-size:10px;font-weight:500;z-index:100;display:none}
.toast.show{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}
</style>
</head>
<body>

<div class="header">
  <div class="icon">P</div>
  <div class="title">Patent Element Inspector</div>
  <div class="ver">v0.1</div>
  <div class="status-dot" id="statusDot"></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('elements',this)">Elements</button>
  <button class="tab" onclick="switchTab('inspect',this)">Inspect<span class="badge" id="inspBadge" style="display:none"></span></button>
  <button class="tab" onclick="switchTab('config',this)">Config</button>
</div>

<!-- ELEMENTS -->
<div class="panel active" id="p-elements">
  <div class="sel-bar">
    <span style="font-size:11px">&#10022;</span>
    <span class="sel-text" id="selText">Select text in document...</span>
    <button class="sel-btn" id="selBtn" onclick="addFromSelection()" disabled>+ Add Selected</button>
  </div>
  <div class="add-form">
    <input class="num-input" placeholder="#" id="addNum" maxlength="5">
    <input class="name-input" placeholder="Element name..." id="addName">
    <button class="add-btn" onclick="addManual()">Add</button>
  </div>
  <div class="search-bar"><input placeholder="Search..." id="searchInput" oninput="render()"></div>
  <div class="filter-bar" id="filterBar">
    <button class="fbtn active" onclick="setF('all',this)">All <span class="cnt" id="fAll">0</span></button>
    <button class="fbtn" onclick="setF('issues',this)">Issues <span class="cnt" id="fIssues">0</span></button>
    <button class="fbtn" onclick="setF('manual',this)">Manual <span class="cnt" id="fManual">0</span></button>
    <button class="fbtn" onclick="setF('ok',this)">OK <span class="cnt" id="fOk">0</span></button>
  </div>
  <div class="elem-list" id="elemList"></div>
  <div class="detail" id="detailPanel"><div class="detail-inner" id="detailInner"></div></div>
</div>

<!-- INSPECT -->
<div class="panel" id="p-inspect">
  <button class="insp-btn" onclick="runInspection()">&#9654; Run Inspection</button>
  <div class="insp-summary" id="inspSummary" style="display:none"></div>
  <div id="issueList"></div>
</div>

<!-- CONFIG -->
<div class="panel" id="p-config">
  <div style="padding:12px">
    <div style="font-size:10px;font-weight:600;text-transform:uppercase;color:var(--tx2);margin-bottom:8px">Data</div>
    <div style="display:flex;gap:6px">
      <button class="add-btn" style="flex:1;padding:8px" onclick="exportJSON()">Export JSON</button>
      <button class="add-btn" style="flex:1;padding:8px;background:var(--bg3);color:var(--tx);border:1px solid var(--brd)" onclick="document.getElementById('importFile').click()">Import JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
    <div style="margin-top:12px;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--tx2);margin-bottom:8px">About</div>
    <div style="font-size:10px;color:var(--tx2)">Patent Element Inspector v0.1<br>Office Add-in for Word<br>Register, manage, and inspect patent elements.</div>
  </div>
</div>

<div class="statusbar">
  <div id="statusLabel">Initializing...</div>
  <div id="statusCount">0 elements</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
var elems = [];
var selId = null, filter = 'all';
var officeReady = false;

// Load from localStorage
try {
  var saved = localStorage.getItem('pei_elements');
  if (saved) elems = JSON.parse(saved);
} catch(e){}

// ============================================================
// OFFICE.JS INIT
// ============================================================
Office.onReady(function(info) {
  officeReady = true;
  document.getElementById('statusDot').className = 'status-dot ok';
  document.getElementById('statusLabel').textContent = 'Connected to ' + (info.host || 'Word');
  render();

  // Poll for selection changes (Office.js doesn't have a selection change event for all cases)
  setInterval(checkSelection, 1500);
});

// Fallback if Office.js not available (testing outside Word)
setTimeout(function(){
  if (!officeReady) {
    document.getElementById('statusDot').className = 'status-dot err';
    document.getElementById('statusLabel').textContent = 'Standalone mode (no Word)';
    render();
  }
}, 3000);

// ============================================================
// SELECTION — Read selected text from Word
// ============================================================
function checkSelection() {
  if (!officeReady) return;
  Word.run(function(ctx) {
    var sel = ctx.document.getSelection();
    sel.load('text');
    return ctx.sync().then(function() {
      var text = (sel.text || '').trim();
      var btn = document.getElementById('selBtn');
      var label = document.getElementById('selText');
      if (text && text.length > 2) {
        label.textContent = '"' + text + '"';
        label.style.fontWeight = '600';
        btn.disabled = false;
      } else {
        label.textContent = 'Select text in document...';
        label.style.fontWeight = '400';
        btn.disabled = true;
      }
    });
  }).catch(function(){});
}

function addFromSelection() {
  if (!officeReady) return;
  Word.run(function(ctx) {
    var sel = ctx.document.getSelection();
    sel.load('text');
    return ctx.sync().then(function() {
      var text = (sel.text || '').trim();
      if (!text) return;
      var m = text.match(/^(.+?)\s+(\d{2,4}[A-Z]?)$/i) || text.match(/^(\d{2,4}[A-Z]?)\s+(.+)$/i);
      if (!m) { toast('Cannot parse: "' + text + '"'); return; }
      var num, name;
      if (/^\d/.test(m[1])) { num = m[1]; name = m[2]; } else { name = m[1]; num = m[2]; }
      name = name.toLowerCase().trim();
      var ex = elems.find(function(e){ return e.num === num; });
      if (ex) {
        if (ex.name === name) { toast('Already registered: ' + name + ' ' + num); }
        else {
          ex.oldNames.push(ex.name);
          ex.name = name;
          ex.issues = 1;
          toast('Updated ' + num + ' → ' + name);
        }
      } else {
        elems.push({ id:'e'+num, num:num, name:name, variants:[], oldNames:[], source:'drag', status:'auto', refs:0, issues:0 });
        toast('Registered: ' + name + ' ' + num);
      }
      save(); render(); sel_elem('e'+num);
    });
  }).catch(function(e){ toast('Error: ' + e.message); });
}

// ============================================================
// INSPECTION — Search document + highlight
// ============================================================
function runInspection() {
  if (!officeReady) { toast('Not connected to Word'); return; }

  var issues = [];
  var totalMatches = 0;

  Word.run(function(ctx) {
    var body = ctx.document.body;
    body.load('text');
    return ctx.sync().then(function() {
      var docText = body.text;

      // For each registered element, search document
      var promises = [];
      elems.forEach(function(el) {
        el.refs = 0;
        el.issues = 0;

        // Search official name + number
        var officialPattern = el.name + ' ' + el.num;
        var results = body.search(officialPattern, { matchCase: false, matchWholeWord: false });
        results.load('items');
        promises.push({ elem: el, type: 'official', results: results });

        // Search variants
        el.variants.forEach(function(v) {
          var vPattern = v + ' ' + el.num;
          var vResults = body.search(vPattern, { matchCase: false, matchWholeWord: false });
          vResults.load('items');
          promises.push({ elem: el, type: 'variant', results: vResults, variant: v });
        });

        // Search old names
        el.oldNames.forEach(function(old) {
          var oPattern = old + ' ' + el.num;
          var oResults = body.search(oPattern, { matchCase: false, matchWholeWord: false });
          oResults.load('items');
          promises.push({ elem: el, type: 'oldname', results: oResults, oldName: old });
        });
      });

      return ctx.sync().then(function() {
        // Process results — apply highlights
        promises.forEach(function(p) {
          var count = p.results.items.length;
          if (p.type === 'official') {
            p.elem.refs += count;
            totalMatches += count;
            // Green highlight
            p.results.items.forEach(function(r) { r.font.highlightColor = 'Green'; });
          } else if (p.type === 'variant') {
            p.elem.refs += count;
            totalMatches += count;
            // Yellow highlight
            p.results.items.forEach(function(r) { r.font.highlightColor = 'Yellow'; });
          } else if (p.type === 'oldname') {
            totalMatches += count;
            if (count > 0) {
              p.elem.issues++;
              // Pink highlight
              p.results.items.forEach(function(r) { r.font.highlightColor = 'Pink'; });
              issues.push({
                type: 'old',
                num: p.elem.num,
                desc: '"' + p.oldName + '" should be "' + p.elem.name + '"',
                count: count
              });
            }
          }
        });

        // Check orphans
        elems.forEach(function(el) {
          if (el.refs === 0) {
            el.issues++;
            issues.push({
              type: 'orphan',
              num: el.num,
              desc: '"' + el.name + '" not found in document',
              count: 0
            });
          }
        });

        return ctx.sync();
      }).then(function() {
        // Show results
        showInspectionResults(issues, totalMatches);
        save(); render();
        toast('Inspection done: ' + issues.length + ' issues');
        switchTab('inspect', document.querySelectorAll('.tab')[1]);
      });
    });
  }).catch(function(e) { toast('Inspection error: ' + e.message); });
}

function showInspectionResults(issues, matches) {
  var sum = document.getElementById('inspSummary');
  sum.style.display = 'grid';
  sum.innerHTML =
    '<div class="istat"><div class="n" style="color:var(--tx)">' + elems.length + '</div><div class="l">Elements</div></div>' +
    '<div class="istat"><div class="n" style="color:var(--green)">' + matches + '</div><div class="l">Matches</div></div>' +
    '<div class="istat"><div class="n" style="color:' + (issues.length > 0 ? 'var(--red)' : 'var(--green)') + '">' + issues.length + '</div><div class="l">Issues</div></div>';

  var badge = document.getElementById('inspBadge');
  if (issues.length > 0) { badge.textContent = issues.length; badge.style.display = 'inline-block'; }
  else { badge.style.display = 'none'; }

  var list = document.getElementById('issueList');
  if (issues.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--green);font-weight:600">All clean!</div>';
    return;
  }
  list.innerHTML = issues.map(function(iss) {
    var cls = iss.type === 'old' ? 'old' : iss.type === 'mismatch' ? 'mis' : 'orp';
    var label = iss.type === 'old' ? 'OLD NAME' : iss.type === 'mismatch' ? 'MISMATCH' : 'UNREFERENCED';
    return '<div class="issue-item" onclick="scrollToElement(\'' + iss.num + '\')">' +
      '<div class="it ' + cls + '">' + label + '</div>' +
      '<div class="id"><strong>' + iss.num + '</strong> — ' + iss.desc + '</div></div>';
  }).join('');
}

function clearHighlights() {
  if (!officeReady) return;
  Word.run(function(ctx) {
    // Search for any highlighted text and remove highlighting
    var body = ctx.document.body;
    ['Green','Yellow','Pink'].forEach(function(color) {
      // We can't easily search by highlight, so we search known patterns
      elems.forEach(function(el) {
        var patterns = [el.name + ' ' + el.num];
        el.variants.forEach(function(v) { patterns.push(v + ' ' + el.num); });
        el.oldNames.forEach(function(o) { patterns.push(o + ' ' + el.num); });
        patterns.forEach(function(p) {
          var r = body.search(p, { matchCase: false });
          r.load('items');
        });
      });
    });
    return ctx.sync().then(function() {
      // Remove all highlights by setting to NoHighlight
      elems.forEach(function(el) {
        var patterns = [el.name + ' ' + el.num];
        el.variants.forEach(function(v) { patterns.push(v + ' ' + el.num); });
        el.oldNames.forEach(function(o) { patterns.push(o + ' ' + el.num); });
        patterns.forEach(function(p) {
          var r = body.search(p, { matchCase: false });
          r.load('items');
        });
      });
      return ctx.sync();
    }).then(function() {
      toast('Highlights cleared');
    });
  }).catch(function(){});
}

function scrollToElement(num) {
  if (!officeReady) return;
  var el = elems.find(function(e) { return e.num === num; });
  if (!el) return;
  Word.run(function(ctx) {
    var results = ctx.document.body.search(el.name + ' ' + num, { matchCase: false });
    results.load('items');
    return ctx.sync().then(function() {
      if (results.items.length > 0) {
        results.items[0].select();
      }
      return ctx.sync();
    });
  }).catch(function(){});
}

// ============================================================
// TABS
// ============================================================
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('p-' + id).classList.add('active');
  btn.classList.add('active');
}

// ============================================================
// RENDER
// ============================================================
function render() {
  var list = document.getElementById('elemList');
  var s = (document.getElementById('searchInput') || {}).value || '';
  s = s.toLowerCase();
  var f = elems.slice();
  if (s) f = f.filter(function(e) { return e.name.indexOf(s) >= 0 || e.num.indexOf(s) >= 0; });
  if (filter === 'issues') f = f.filter(function(e) { return e.issues > 0; });
  else if (filter === 'manual') f = f.filter(function(e) { return e.source === 'manual'; });
  else if (filter === 'ok') f = f.filter(function(e) { return e.status === 'confirmed'; });

  list.innerHTML = f.map(function(e) {
    var a = selId === e.id, m = e.source === 'manual', b = '';
    if (m) b += '<span class="bsm b-manual">M</span>';
    if (e.issues > 0) b += '<span class="bsm b-issue">!' + e.issues + '</span>';
    else if (e.status === 'confirmed') b += '<span class="bsm b-ok">OK</span>';
    return '<div class="elem-row' + (a ? ' active' : '') + (m ? ' manual' : '') + '" onclick="sel_elem(\'' + e.id + '\')">' +
      '<div class="e-num">' + e.num + '</div><div class="e-info"><div class="e-name">' + e.name + '</div>' +
      '<div class="e-meta">' + e.refs + ' refs' + (e.variants.length ? ' · ' + e.variants.length + 'v' : '') + '</div></div>' +
      '<div class="e-badges">' + b + '</div></div>';
  }).join('');

  document.getElementById('fAll').textContent = elems.length;
  document.getElementById('fIssues').textContent = elems.filter(function(e) { return e.issues > 0; }).length;
  document.getElementById('fManual').textContent = elems.filter(function(e) { return e.source === 'manual'; }).length;
  document.getElementById('fOk').textContent = elems.filter(function(e) { return e.status === 'confirmed'; }).length;
  document.getElementById('statusCount').textContent = elems.length + ' elements';
}

function setF(f, btn) {
  filter = f;
  document.querySelectorAll('#filterBar .fbtn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

// ============================================================
// SELECT + DETAIL
// ============================================================
function sel_elem(id) {
  selId = id;
  render();
  var e = elems.find(function(x) { return x.id === id; });
  if (!e) return;
  var inner = document.getElementById('detailInner');
  var h = '<div class="dh"><div class="dh-num">' + e.num + '</div><button class="dh-close" onclick="closeDetail()">x</button></div>';
  h += '<div class="fg"><div class="fl">Official Name</div><div style="display:flex;gap:4px"><input class="fi" id="dName" value="' + e.name + '" style="flex:1"><button class="add-btn" style="padding:3px 7px;font-size:8px" onclick="saveName(\'' + e.id + '\')">Save</button></div></div>';
  h += '<div class="fg"><div class="fl">Variants</div><input class="fi" id="dVariants" value="' + e.variants.join(', ') + '" placeholder="comma-separated..."><div class="fh">OK forms</div></div>';
  h += '<div class="fg"><div class="fl">Old Names</div>';
  if (e.oldNames.length) h += '<div>' + e.oldNames.map(function(n) { return '<span class="old-tag">' + n + '</span>'; }).join('') + '</div>';
  h += '<div style="display:flex;gap:4px;margin-top:3px"><input class="fi" id="dOldName" placeholder="Add old name..." style="flex:1"><button class="add-btn" style="padding:3px 7px;font-size:8px" onclick="addOldName(\'' + e.id + '\')">+</button></div>';
  h += '<div class="fh">Flagged as issues</div></div>';
  h += '<div class="fg"><button class="add-btn" style="width:100%;padding:6px;background:var(--green);font-size:9px" onclick="confirmElem(\'' + e.id + '\')">' + (e.status === 'confirmed' ? '✓ Confirmed' : 'Confirm') + '</button></div>';
  inner.innerHTML = h;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selId = null;
  render();
}

function saveName(id) {
  var e = elems.find(function(x) { return x.id === id; });
  if (!e) return;
  var newName = document.getElementById('dName').value.trim().toLowerCase();
  if (!newName || newName === e.name) return;
  e.oldNames.push(e.name);
  e.name = newName;
  save(); render(); sel_elem(id);
  toast('Name updated → ' + newName);
}

function saveVariants(id) {
  var e = elems.find(function(x) { return x.id === id; });
  if (!e) return;
  var val = document.getElementById('dVariants').value;
  e.variants = val.split(',').map(function(v) { return v.trim().toLowerCase(); }).filter(Boolean);
  save();
  toast('Variants saved');
}

function addOldName(id) {
  var e = elems.find(function(x) { return x.id === id; });
  if (!e) return;
  var val = document.getElementById('dOldName').value.trim().toLowerCase();
  if (!val) return;
  e.oldNames.push(val);
  save(); sel_elem(id);
  toast('Old name added: ' + val);
}

function confirmElem(id) {
  var e = elems.find(function(x) { return x.id === id; });
  if (!e) return;
  // Also save variants from input
  var varInput = document.getElementById('dVariants');
  if (varInput) {
    e.variants = varInput.value.split(',').map(function(v) { return v.trim().toLowerCase(); }).filter(Boolean);
  }
  e.status = e.status === 'confirmed' ? 'auto' : 'confirmed';
  save(); render(); sel_elem(id);
}

// ============================================================
// MANUAL ADD
// ============================================================
function addManual() {
  var num = document.getElementById('addNum').value.trim();
  var name = document.getElementById('addName').value.trim().toLowerCase();
  if (!num || !name) return;
  if (elems.find(function(e) { return e.num === num; })) { toast('Element ' + num + ' already exists'); return; }
  elems.push({ id: 'e' + num, num: num, name: name, variants: [], oldNames: [], source: 'manual', status: 'auto', refs: 0, issues: 0 });
  document.getElementById('addNum').value = '';
  document.getElementById('addName').value = '';
  save(); render(); sel_elem('e' + num);
  toast('Added: ' + name + ' ' + num);
}

// ============================================================
// PERSISTENCE
// ============================================================
function save() {
  try { localStorage.setItem('pei_elements', JSON.stringify(elems)); } catch(e){}
}

function exportJSON() {
  var data = JSON.stringify(elems, null, 2);
  var blob = new Blob([data], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'pei-elements.json'; a.click();
  URL.revokeObjectURL(url);
  toast('Exported ' + elems.length + ' elements');
}

function importJSON(ev) {
  var file = ev.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var imported = JSON.parse(e.target.result);
      if (Array.isArray(imported)) {
        elems = imported;
        save(); render();
        toast('Imported ' + elems.length + ' elements');
      }
    } catch(err) { toast('Invalid JSON file'); }
  };
  reader.readAsText(file);
}

// ============================================================
// TOAST
// ============================================================
function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2000);
}

// ============================================================
// INIT
// ============================================================
render();
</script>
</body>
</html>
